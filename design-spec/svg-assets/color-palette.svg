<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none">
  <title>CareerX Brand Color Palette</title>

  <!-- Background -->
  <rect width="1200" height="600" fill="white"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">COLOR PALETTE</text>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Brand colors extracted from codebase constants</text>

  <!-- ===== Primary Brand Colors ===== -->
  <text x="60" y="100" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0C0E14">Primary Brand</text>

  <!-- Dark -->
  <g transform="translate(60, 115)">
    <rect width="160" height="120" rx="16" fill="#0C0E14"/>
    <text x="16" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Dark</text>
    <text x="16" y="108" font-family="Inter, sans-serif" font-size="11" fill="white" fill-opacity="0.6">#0C0E14</text>
  </g>

  <!-- Brand Blue -->
  <g transform="translate(236, 115)">
    <rect width="160" height="120" rx="16" fill="#3C61A8"/>
    <text x="16" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Brand Blue</text>
    <text x="16" y="108" font-family="Inter, sans-serif" font-size="11" fill="white" fill-opacity="0.6">#3C61A8</text>
  </g>

  <!-- Yellow -->
  <g transform="translate(412, 115)">
    <rect width="160" height="120" rx="16" fill="#F5D134"/>
    <text x="16" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0C0E14">Yellow</text>
    <text x="16" y="108" font-family="Inter, sans-serif" font-size="11" fill="#0C0E14" fill-opacity="0.6">#F5D134</text>
  </g>

  <!-- Hero Blue (variant) -->
  <g transform="translate(588, 115)">
    <rect width="160" height="120" rx="16" fill="#4267B2"/>
    <text x="16" y="90" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="white">Hero Blue</text>
    <text x="16" y="108" font-family="Inter, sans-serif" font-size="11" fill="white" fill-opacity="0.6">#4267B2</text>
  </g>

  <!-- ===== Accent / Semantic Colors ===== -->
  <text x="60" y="270" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0C0E14">Accent / Semantic</text>

  <!-- Green -->
  <g transform="translate(60, 285)">
    <rect width="130" height="100" rx="14" fill="#22C55E"/>
    <text x="14" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">Green</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.7">#22C55E</text>
  </g>

  <!-- Red -->
  <g transform="translate(206, 285)">
    <rect width="130" height="100" rx="14" fill="#EF4444"/>
    <text x="14" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">Red</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.7">#EF4444</text>
  </g>

  <!-- Purple (Activate stage) -->
  <g transform="translate(352, 285)">
    <rect width="130" height="100" rx="14" fill="#6B21A8"/>
    <text x="14" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">Purple</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.7">#6B21A8</text>
  </g>

  <!-- Teal (Prepare stage) -->
  <g transform="translate(498, 285)">
    <rect width="130" height="100" rx="14" fill="#2D6A4F"/>
    <text x="14" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">Teal</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.7">#2D6A4F</text>
  </g>

  <!-- Amber (Validate stage) -->
  <g transform="translate(644, 285)">
    <rect width="130" height="100" rx="14" fill="#92400E"/>
    <text x="14" y="72" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="white">Amber</text>
    <text x="14" y="88" font-family="Inter, sans-serif" font-size="10" fill="white" fill-opacity="0.7">#92400E</text>
  </g>

  <!-- ===== Backgrounds & Neutrals ===== -->
  <text x="60" y="420" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0C0E14">Backgrounds &amp; Neutrals</text>

  <!-- Page BG -->
  <g transform="translate(60, 435)">
    <rect width="110" height="80" rx="12" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Page BG</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#F7F8FC</text>
  </g>

  <!-- White -->
  <g transform="translate(186, 435)">
    <rect width="110" height="80" rx="12" fill="white" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">White</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#FFFFFF</text>
  </g>

  <!-- Card border -->
  <g transform="translate(312, 435)">
    <rect width="110" height="80" rx="12" fill="#E5E7EB"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Border</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">#E5E7EB</text>
  </g>

  <!-- Light blue (hero stage bg) -->
  <g transform="translate(438, 435)">
    <rect width="110" height="80" rx="12" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Light Blue</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#EEF2FF</text>
  </g>

  <!-- Light green -->
  <g transform="translate(564, 435)">
    <rect width="110" height="80" rx="12" fill="#ECFDF5" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Light Green</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#ECFDF5</text>
  </g>

  <!-- Light orange -->
  <g transform="translate(690, 435)">
    <rect width="110" height="80" rx="12" fill="#FFF7ED" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Light Orange</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#FFF7ED</text>
  </g>

  <!-- Light purple -->
  <g transform="translate(816, 435)">
    <rect width="110" height="80" rx="12" fill="#F5F3FF" stroke="#E5E7EB" stroke-width="1"/>
    <text x="12" y="52" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#374151">Light Purple</text>
    <text x="12" y="68" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">#F5F3FF</text>
  </g>

  <!-- ===== Text Opacity Scale ===== -->
  <text x="60" y="550" font-family="Inter, sans-serif" font-size="13" font-weight="700" fill="#0C0E14">Text Opacity Scale (on dark #0C0E14 base)</text>

  <g transform="translate(60, 562)">
    <rect width="80" height="24" rx="6" fill="#0C0E14"/>
    <text x="8" y="17" font-family="Inter, sans-serif" font-size="10" fill="white">100%</text>

    <rect x="90" width="80" height="24" rx="6" fill="#0C0E14" fill-opacity="0.7"/>
    <text x="98" y="17" font-family="Inter, sans-serif" font-size="10" fill="white">70%</text>

    <rect x="180" width="80" height="24" rx="6" fill="#0C0E14" fill-opacity="0.5"/>
    <text x="188" y="17" font-family="Inter, sans-serif" font-size="10" fill="white">50%</text>

    <rect x="270" width="80" height="24" rx="6" fill="#0C0E14" fill-opacity="0.45"/>
    <text x="278" y="17" font-family="Inter, sans-serif" font-size="10" fill="white">45%</text>

    <rect x="360" width="80" height="24" rx="6" fill="#0C0E14" fill-opacity="0.3"/>
    <text x="368" y="17" font-family="Inter, sans-serif" font-size="10" fill="white">30%</text>

    <text x="460" y="17" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Used for: headings, body, labels, muted, decorative</text>
  </g>
</svg>