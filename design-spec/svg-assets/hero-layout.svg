<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="900" viewBox="0 0 1200 900" fill="none">
  <title>CareerX Hero Layout - Orbit + Headline</title>

  <!-- Background -->
  <rect width="1200" height="900" fill="white"/>
  <!-- Subtle radial gradient -->
  <radialGradient id="heroGrad" cx="50%" cy="50%" r="40%">
    <stop offset="0%" stop-color="#EEF2FF" stop-opacity="0.5"/>
    <stop offset="100%" stop-color="white" stop-opacity="0"/>
  </radialGradient>
  <rect width="1200" height="900" fill="url(#heroGrad)"/>

  <!-- Dot pattern hint -->
  <pattern id="dotGrid" x="0" y="0" width="32" height="32" patternUnits="userSpaceOnUse">
    <circle cx="16" cy="16" r="0.8" fill="black" fill-opacity="0.035"/>
  </pattern>
  <rect width="1200" height="900" fill="url(#dotGrid)"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">HERO SECTION LAYOUT</text>

  <!-- ===== Badge (top center) ===== -->
  <g transform="translate(600, 80)">
    <rect x="-130" y="-14" width="260" height="28" rx="14" fill="#EEF2FF" stroke="#4267B2" stroke-width="1"/>
    <circle cx="-108" cy="0" r="3" fill="#4267B2"/>
    <text x="-96" y="4" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#4267B2" letter-spacing="0.15em">CAREER ACCELERATION FRAMEWORK</text>
  </g>

  <!-- ===== Orbit Circle ===== -->
  <g transform="translate(600, 340)">
    <!-- Dashed orbit ring -->
    <circle cx="0" cy="0" r="210" fill="none" stroke="#4267B2" stroke-opacity="0.12" stroke-width="2" stroke-dasharray="8,6"/>

    <!-- Stage card: Discover (top, 270deg = top) -->
    <g transform="translate(-54, -210)">
      <rect width="108" height="72" rx="16" fill="white" stroke="#4267B2" stroke-width="1.5"/>
      <text x="54" y="30" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">&#x1F50D;</text>
      <text x="54" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.1em">01</text>
      <text x="54" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Discover</text>
    </g>

    <!-- Stage card: Prepare (right, 0deg) -->
    <g transform="translate(156, -36)">
      <rect width="108" height="72" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="54" y="30" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">&#x1F4DA;</text>
      <text x="54" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.1em">02</text>
      <text x="54" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Prepare</text>
    </g>

    <!-- Stage card: Validate (bottom, 90deg) -->
    <g transform="translate(-54, 174)">
      <rect width="108" height="72" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="54" y="30" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">&#x2705;</text>
      <text x="54" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.1em">03</text>
      <text x="54" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Validate</text>
    </g>

    <!-- Stage card: Activate (left, 180deg) -->
    <g transform="translate(-264, -36)">
      <rect width="108" height="72" rx="16" fill="white" stroke="#E5E7EB" stroke-width="1"/>
      <text x="54" y="30" font-family="Inter, sans-serif" font-size="18" text-anchor="middle">&#x1F680;</text>
      <text x="54" y="46" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#9CA3AF" text-anchor="middle" letter-spacing="0.1em">04</text>
      <text x="54" y="60" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#374151" text-anchor="middle">Activate</text>
    </g>

    <!-- Center content placeholder -->
    <g>
      <rect x="-140" y="-60" width="280" height="120" rx="12" fill="white" fill-opacity="0.9" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="4,4"/>
      <!-- Stage indicator pill -->
      <rect x="-52" y="-45" width="104" height="22" rx="11" fill="#EEF2FF"/>
      <text x="0" y="-30" font-family="Inter, sans-serif" font-size="10" font-weight="700" fill="#4267B2" text-anchor="middle" letter-spacing="0.08em">01 -- DISCOVER</text>
      <!-- Dynamic headline -->
      <text x="0" y="-4" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">Find the role that</text>
      <text x="0" y="16" font-family="Inter, sans-serif" font-size="16" font-weight="700" fill="#111827" text-anchor="middle">actually fits you.</text>
      <!-- Dynamic subline -->
      <text x="0" y="38" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">Understand where you stand</text>
      <text x="0" y="52" font-family="Inter, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">and what the market expects.</text>
    </g>
  </g>

  <!-- ===== Main Headline (below orbit) ===== -->
  <g transform="translate(600, 610)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#111827" text-anchor="middle" letter-spacing="-0.02em">Career Readiness,</text>
    <text x="0" y="50" font-family="Inter, sans-serif" font-size="42" font-weight="900" fill="#4267B2" text-anchor="middle" letter-spacing="-0.02em">Built Step by Step</text>

    <!-- Subtitle -->
    <text x="0" y="86" font-family="Inter, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">A structured journey that helps you discover the right role,</text>
    <text x="0" y="104" font-family="Inter, sans-serif" font-size="14" fill="#6B7280" text-anchor="middle">build real capability, and prepare for interviews with clarity.</text>

    <!-- CTA buttons -->
    <g transform="translate(-150, 125)">
      <!-- Primary CTA -->
      <rect width="190" height="42" rx="21" fill="#4267B2"/>
      <text x="72" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white">Find My Best Role</text>
      <!-- Arrow -->
      <line x1="162" y1="21" x2="172" y2="21" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
      <polyline points="168,17 172,21 168,25" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </g>
    <g transform="translate(60, 125)">
      <!-- Secondary CTA -->
      <rect width="180" height="42" rx="21" fill="white" stroke="#4267B2" stroke-width="2"/>
      <text x="56" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#4267B2">See How It Works</text>
      <!-- Play icon -->
      <polygon points="36,15 36,27 46,21" fill="#4267B2"/>
    </g>
  </g>

  <!-- Scroll hint -->
  <text x="600" y="870" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#D1D5DB" text-anchor="middle" letter-spacing="0.18em">SCROLL TO EXPLORE</text>

  <!-- Layout annotations -->
  <text x="60" y="870" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Orbit radius: 210px (desktop) / 180px (tablet) / 145px (mobile)  |  Card: 108x72px  |  Auto-rotate: 2.8s interval</text>
</svg>