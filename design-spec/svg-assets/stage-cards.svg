<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="500" viewBox="0 0 1200 500" fill="none">
  <title>CareerX Stage Cards - How It Works</title>

  <!-- Background -->
  <rect width="1200" height="500" fill="#F7F8FC"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">HOW IT WORKS - STAGE CARDS</text>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">4-column grid (lg), 2-column (sm), 1-column (mobile) | gap: 16px | White cards with subtle border</text>

  <!-- ===== Card 1: Discover ===== -->
  <g transform="translate(60, 90)">
    <rect width="260" height="240" rx="16" fill="white" stroke="rgba(12,14,20,0.07)" stroke-width="1"/>
    <!-- Shadow hint -->
    <rect width="260" height="240" rx="16" fill="none" filter="url(#cardShadow)"/>

    <!-- Yellow icon box -->
    <rect x="20" y="20" width="40" height="40" rx="12" fill="#F5D134"/>
    <!-- Compass icon placeholder -->
    <circle cx="40" cy="40" r="10" fill="none" stroke="#0C0E14" stroke-width="2"/>
    <line x1="40" y1="33" x2="40" y2="47" stroke="#0C0E14" stroke-width="1.5"/>
    <line x1="33" y1="40" x2="47" y2="40" stroke="#0C0E14" stroke-width="1.5"/>

    <!-- Stage label -->
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="rgba(60,97,168,0.55)" letter-spacing="0.22em">DISCOVER</text>

    <!-- Product name -->
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8">Know Yourself Better</text>

    <!-- Description -->
    <text x="20" y="132" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">Find which roles fit your</text>
    <text x="20" y="148" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">strengths using real job</text>
    <text x="20" y="164" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">market data.</text>

    <!-- Color annotation -->
    <rect x="20" y="200" width="12" height="12" rx="3" fill="#4267B2"/>
    <text x="38" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Discover: #4267B2</text>
    <rect x="140" y="200" width="12" height="12" rx="3" fill="#EEF2FF"/>
    <text x="158" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Light: #EEF2FF</text>
  </g>

  <!-- ===== Card 2: Prepare ===== -->
  <g transform="translate(340, 90)">
    <rect width="260" height="240" rx="16" fill="white" stroke="rgba(12,14,20,0.07)" stroke-width="1"/>

    <!-- Yellow icon box -->
    <rect x="20" y="20" width="40" height="40" rx="12" fill="#F5D134"/>
    <!-- BookOpen icon placeholder -->
    <rect x="30" y="32" width="20" height="16" rx="2" fill="none" stroke="#0C0E14" stroke-width="2"/>
    <line x1="40" y1="32" x2="40" y2="48" stroke="#0C0E14" stroke-width="1.5"/>

    <!-- Stage label -->
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="rgba(60,97,168,0.55)" letter-spacing="0.22em">PREPARE</text>

    <!-- Product name -->
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8">Career Track</text>

    <!-- Description -->
    <text x="20" y="132" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">Close skill gaps with</text>
    <text x="20" y="148" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">structured learning built</text>
    <text x="20" y="164" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">for your target role.</text>

    <!-- Color annotation -->
    <rect x="20" y="200" width="12" height="12" rx="3" fill="#2D6A4F"/>
    <text x="38" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Prepare: #2D6A4F</text>
    <rect x="140" y="200" width="12" height="12" rx="3" fill="#ECFDF5"/>
    <text x="158" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Light: #ECFDF5</text>
  </g>

  <!-- Arrow connector between cards -->
  <g transform="translate(318, 210)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="12,-4 16,0 12,4" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(598, 210)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="12,-4 16,0 12,4" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  </g>
  <g transform="translate(878, 210)">
    <line x1="0" y1="0" x2="16" y2="0" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="12,-4 16,0 12,4" fill="none" stroke="#D1D5DB" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- ===== Card 3: Validate ===== -->
  <g transform="translate(620, 90)">
    <rect width="260" height="240" rx="16" fill="white" stroke="rgba(12,14,20,0.07)" stroke-width="1"/>

    <!-- Yellow icon box -->
    <rect x="20" y="20" width="40" height="40" rx="12" fill="#F5D134"/>
    <!-- Mic icon placeholder -->
    <rect x="36" y="30" width="8" height="14" rx="4" fill="none" stroke="#0C0E14" stroke-width="2"/>
    <path d="M32 42 C32 46 36 50 40 50 C44 50 48 46 48 42" fill="none" stroke="#0C0E14" stroke-width="1.5"/>

    <!-- Stage label -->
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="rgba(60,97,168,0.55)" letter-spacing="0.22em">VALIDATE</text>

    <!-- Product name -->
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8">Interview Simulator</text>

    <!-- Description -->
    <text x="20" y="132" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">Measure your readiness</text>
    <text x="20" y="148" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">through AI-powered</text>
    <text x="20" y="164" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">interview simulations.</text>

    <!-- Color annotation -->
    <rect x="20" y="200" width="12" height="12" rx="3" fill="#92400E"/>
    <text x="38" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Validate: #92400E</text>
    <rect x="140" y="200" width="12" height="12" rx="3" fill="#FFF7ED"/>
    <text x="158" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Light: #FFF7ED</text>
  </g>

  <!-- ===== Card 4: Activate ===== -->
  <g transform="translate(900, 90)">
    <rect width="260" height="240" rx="16" fill="white" stroke="rgba(12,14,20,0.07)" stroke-width="1"/>

    <!-- Yellow icon box -->
    <rect x="20" y="20" width="40" height="40" rx="12" fill="#F5D134"/>
    <!-- Rocket icon placeholder -->
    <path d="M40 30 L46 40 L40 48 L34 40 Z" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>

    <!-- Stage label -->
    <text x="20" y="88" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="rgba(60,97,168,0.55)" letter-spacing="0.22em">ACTIVATE</text>

    <!-- Product name -->
    <text x="20" y="110" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8">Career Activation</text>

    <!-- Description -->
    <text x="20" y="132" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">Connect with job</text>
    <text x="20" y="148" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">opportunities matched to</text>
    <text x="20" y="164" font-family="Inter, sans-serif" font-size="12" fill="rgba(12,14,20,0.5)">your profile and readiness.</text>

    <!-- Color annotation -->
    <rect x="20" y="200" width="12" height="12" rx="3" fill="#6B21A8"/>
    <text x="38" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Activate: #6B21A8</text>
    <rect x="140" y="200" width="12" height="12" rx="3" fill="#F5F3FF"/>
    <text x="158" y="211" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Light: #F5F3FF</text>
  </g>

  <!-- Spec notes -->
  <text x="60" y="370" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Card specs: bg-white, rounded-2xl (16px), p-5, border: 1px solid rgba(12,14,20,0.07)</text>
  <text x="60" y="388" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Icon box: 40x40, rounded-xl (12px), bg: #F5D134, icon color: #0C0E14</text>
  <text x="60" y="406" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Hover: -translate-y-1 (4px lift), Arrow connectors visible on lg breakpoint only</text>
  <text x="60" y="424" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Section bg: #F7F8FC | Grid: 1col (mobile) -> 2col (sm) -> 4col (lg) | gap: 16px</text>

  <!-- CTA below cards -->
  <g transform="translate(460, 455)">
    <rect width="190" height="44" rx="22" fill="#3C61A8"/>
    <text x="30" y="28" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="white">Find My Best Role</text>
    <line x1="162" y1="22" x2="172" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="168,18 172,22 168,26" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  </g>
</svg>