      <text x="0" y="96" font-family="Inter, sans-serif" font-size="13" fill="rgba(12,14,20,0.5)">Full career track with expert coaching</text>

      <!-- Price -->
      <text x="0" y="140" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#0C0E14">$649</text>
      <text x="82" y="140" font-family="Inter, sans-serif" font-size="13" fill="rgba(12,14,20,0.4)">one-time</text>

      <!-- Features (blue check circles) -->
      <g transform="translate(0, 170)">
