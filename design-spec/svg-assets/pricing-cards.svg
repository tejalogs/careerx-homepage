    <g transform="translate(28, 28)">
      <!-- Icon circle -->
      <circle cx="24" cy="24" r="24" fill="none" stroke="rgba(12,14,20,0.2)" stroke-width="2"/>
      <!-- Rocket icon -->
      <path d="M24 14 L30 28 L24 36 L18 28 Z" fill="none" stroke="rgba(12,14,20,0.5)" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="24" cy="24" r="2" fill="rgba(12,14,20,0.5)"/>

