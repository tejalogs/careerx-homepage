      <!-- Price -->
      <text x="0" y="140" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#0C0E14">$799</text>
      <text x="82" y="140" font-family="Inter, sans-serif" font-size="13" fill="rgba(12,14,20,0.4)">one-time</text>

      <!-- Features -->
      <g transform="translate(0, 170)">
        <circle cx="10" cy="10" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,10 9,13 14,7" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">KYB Role Assessment</text>

        <circle cx="10" cy="40" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,40 9,43 14,37" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="44" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">2 Full Career Tracks</text>

        <circle cx="10" cy="70" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,70 9,73 14,67" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="74" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">2 Career Expert Sessions</text>

        <circle cx="10" cy="100" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,100 9,103 14,97" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="104" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">6 months Interview PrepX</text>

        <circle cx="10" cy="130" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,130 9,133 14,127" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="134" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">6 months Career Activation</text>
      </g>

      <!-- CTA Button -->
      <g transform="translate(0, 410)">
        <rect x="4" y="4" width="284" height="48" rx="8" fill="rgba(12,14,20,0.15)"/>
        <rect width="284" height="48" rx="8" fill="white" stroke="#0C0E14" stroke-width="2"/>
        <text x="142" y="30" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="#0C0E14" text-anchor="middle">Find My Best Role</text>
      </g>
    </g>
  </g>

  <!-- Neobrutalism spec annotations -->
  <g transform="translate(60, 680)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">Neobrutalism Shadow Spec:</text>
    <text x="0" y="18" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Default: shadow-[4px_4px_0px_0px]  |  Hover: shadow-[8px_8px_0px_0px] + translate(-1px, -1px)</text>
    <text x="0" y="36" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Popular card: border/shadow color = #3C61A8  |  Default: border #0C0E14, shadow rgba(12,14,20,0.2)</text>
    <text x="0" y="54" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">Button shadow: 4px 4px default, 6px 6px hover  |  Popular CTA: filled #3C61A8 bg  |  Default: white bg + dark border</text>
  </g>
</svg>