        <polyline points="6,10 9,13 14,7" fill="none" stroke="#3C61A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">KYB Role Assessment</text>

        <circle cx="10" cy="40" r="10" fill="none" stroke="#3C61A8" stroke-width="2"/>
        <polyline points="6,40 9,43 14,37" fill="none" stroke="#3C61A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="44" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">1 Full Career Track</text>

        <circle cx="10" cy="70" r="10" fill="none" stroke="#3C61A8" stroke-width="2"/>
        <polyline points="6,70 9,73 14,67" fill="none" stroke="#3C61A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="74" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">1 Career Expert Session</text>

        <circle cx="10" cy="100" r="10" fill="none" stroke="#3C61A8" stroke-width="2"/>
        <polyline points="6,100 9,103 14,97" fill="none" stroke="#3C61A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="104" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">3 months Interview PrepX</text>

        <circle cx="10" cy="130" r="10" fill="none" stroke="#3C61A8" stroke-width="2"/>
        <polyline points="6,130 9,133 14,127" fill="none" stroke="#3C61A8" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="134" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">3 months Career Activation</text>
      </g>

      <!-- CTA Button (filled blue for popular) -->
      <g transform="translate(0, 410)">
        <rect x="4" y="4" width="284" height="48" rx="8" fill="rgba(60,97,168,0.3)"/>
        <rect width="284" height="48" rx="8" fill="#3C61A8" stroke="#3C61A8" stroke-width="2"/>
        <text x="142" y="30" font-family="Inter, sans-serif" font-size="15" font-weight="600" fill="white" text-anchor="middle">Find My Best Role</text>
      </g>
    </g>
  </g>

  <!-- ===== Card 3: Career Elite ($799) ===== -->
