<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="750" viewBox="0 0 1200 750" fill="none">
  <title>CareerX Pricing Cards - Neobrutalism Style</title>

  <!-- Background -->
  <rect width="1200" height="750" fill="#F7F8FC"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">PRICING CARDS - NEOBRUTALISM</text>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">3-column grid (md) | border-2 | shadow: 4px 4px 0px 0px | hover: 8px 8px 0px 0px</text>

  <!-- ===== Card 1: Career Builder ($449) ===== -->
  <g transform="translate(60, 90)">
    <!-- Shadow layer -->
    <rect x="4" y="4" width="340" height="560" rx="16" fill="rgba(12,14,20,0.2)"/>
    <!-- Card -->
    <rect width="340" height="560" rx="16" fill="white" stroke="#0C0E14" stroke-width="2"/>

    <!-- Content -->
    <g transform="translate(28, 28)">
      <!-- Icon circle -->
      <circle cx="24" cy="24" r="24" fill="none" stroke="rgba(12,14,20,0.2)" stroke-width="2"/>
      <!-- Target icon -->
      <circle cx="24" cy="24" r="10" fill="none" stroke="rgba(12,14,20,0.5)" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="4" fill="none" stroke="rgba(12,14,20,0.5)" stroke-width="1.5"/>
      <circle cx="24" cy="24" r="1.5" fill="rgba(12,14,20,0.5)"/>

      <!-- Plan name -->
      <text x="0" y="76" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0C0E14">Career Builder</text>
      <!-- Description -->
      <text x="0" y="96" font-family="Inter, sans-serif" font-size="13" fill="rgba(12,14,20,0.5)">Discover your role fit and start preparing</text>

      <!-- Price -->
      <text x="0" y="140" font-family="Inter, sans-serif" font-size="36" font-weight="700" fill="#0C0E14">$449</text>
      <text x="82" y="140" font-family="Inter, sans-serif" font-size="13" fill="rgba(12,14,20,0.4)">one-time</text>

      <!-- Features -->
      <g transform="translate(0, 170)">
        <!-- Feature 1 -->
        <circle cx="10" cy="10" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,10 9,13 14,7" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">KYB Role Assessment</text>

        <!-- Feature 2 -->
        <circle cx="10" cy="40" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,40 9,43 14,37" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="44" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">1 Full Career Track</text>

        <!-- Feature 3 -->
        <circle cx="10" cy="70" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,70 9,73 14,67" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="74" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">Skill development roadmap</text>

        <!-- Feature 4 -->
        <circle cx="10" cy="100" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,100 9,103 14,97" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="104" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">1 Interview Simulator session</text>

        <!-- Feature 5 -->
        <circle cx="10" cy="130" r="10" fill="none" stroke="rgba(12,14,20,0.3)" stroke-width="2"/>
        <polyline points="6,130 9,133 14,127" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        <text x="28" y="134" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#0C0E14">1 month Career Activation</text>
      </g>

