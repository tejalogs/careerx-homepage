<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" fill="none">
  <title>CareerX Typography Scale</title>

  <!-- Background -->
  <rect width="1200" height="620" fill="white"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">TYPOGRAPHY SCALE</text>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Font: Inter | Weights: 400 (regular), 500 (medium), 600 (semibold), 700 (bold), 900 (black)</text>

  <!-- ===== Heading Scale ===== -->

  <!-- H1: Hero headline -->
  <g transform="translate(60, 100)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">H1 - Hero Headline</text>
    <text x="0" y="52" font-family="Inter, sans-serif" font-size="48" font-weight="900" fill="#0C0E14" letter-spacing="-0.02em">Career Readiness, Built Step by Step</text>
    <text x="0" y="72" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">48px (3rem) / md:5xl / font-black / tracking-tight / leading-tight</text>
    <text x="500" y="72" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Mobile: 30px (text-3xl) | Tablet: 36px (text-4xl) | Desktop: 48px (text-5xl)</text>
  </g>

  <!-- H1 Large: CTA section -->
  <g transform="translate(60, 190)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">H1 Large - CTA Section</text>
    <text x="0" y="56" font-family="Inter, sans-serif" font-size="56" font-weight="900" fill="#0C0E14" letter-spacing="-0.02em">Find your best role.</text>
    <text x="0" y="76" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">56px (lg:7xl) / font-black / tracking-tight / leading-[1.05]</text>
    <text x="500" y="76" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Responsive: 30px -> 36px -> 48px -> 56px</text>
  </g>

  <!-- H2: Section headings -->
  <g transform="translate(60, 290)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">H2 - Section Heading</text>
    <text x="0" y="40" font-family="Inter, sans-serif" font-size="36" font-weight="900" fill="#0C0E14" letter-spacing="-0.02em">Four stages. One structured system.</text>
    <text x="0" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">36px (md:5xl) / font-black / tracking-tight / leading-tight</text>
    <text x="500" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">Mobile: 24px (text-2xl) | Tablet: 30px (text-3xl) | Desktop: 36-48px</text>
  </g>

  <!-- H3: Card titles -->
  <g transform="translate(60, 370)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">H3 - Card Title</text>
    <text x="0" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8">Know Yourself Better</text>
    <text x="200" y="26" font-family="Inter, sans-serif" font-size="20" font-weight="700" fill="#0C0E14">Career Builder</text>
    <text x="0" y="44" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">14px font-black (service cards) | 20px font-bold (pricing cards)</text>
  </g>

  <!-- Body text -->
  <g transform="translate(60, 420)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">Body Text Sizes</text>
    <text x="0" y="26" font-family="Inter, sans-serif" font-size="15" fill="#0C0E14" fill-opacity="0.7">15px - FAQ question text, problem card text (font-bold)</text>
    <text x="0" y="48" font-family="Inter, sans-serif" font-size="14" fill="#0C0E14" fill-opacity="0.5">14px - Section subtitles, CTA text (font-medium to font-bold)</text>
    <text x="0" y="68" font-family="Inter, sans-serif" font-size="13" fill="#0C0E14" fill-opacity="0.5">13px - Navbar brand, pricing descriptions (font-semibold)</text>
    <text x="0" y="88" font-family="Inter, sans-serif" font-size="12.5" fill="black" fill-opacity="0.7">12.5px - Navbar links, CTA button text (font-medium to font-semibold)</text>
    <text x="0" y="108" font-family="Inter, sans-serif" font-size="12" fill="#0C0E14" fill-opacity="0.5">12px - Card descriptions (regular weight, leading-relaxed)</text>
    <text x="0" y="128" font-family="Inter, sans-serif" font-size="11" fill="#0C0E14" fill-opacity="0.45">11px - Badges, fine print (font-semibold, tracking-widest)</text>
  </g>

  <!-- Labels & micro text -->
  <g transform="translate(60, 562)">
    <text x="0" y="0" font-family="Inter, sans-serif" font-size="11" font-weight="600" fill="#3C61A8">Labels &amp; Micro Text</text>
    <text x="0" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="#3C61A8" fill-opacity="0.55" letter-spacing="0.22em">STAGE LABEL</text>
    <text x="120" y="24" font-family="Inter, sans-serif" font-size="10" font-weight="900" fill="#3C61A8" fill-opacity="0.45" letter-spacing="0.3em">SECTION EYEBROW</text>
    <text x="320" y="24" font-family="Inter, sans-serif" font-size="9" font-weight="900" fill="#3C61A8" fill-opacity="0.4" letter-spacing="0.25em">LOGO STRIP LABEL</text>
    <text x="0" y="44" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">10px font-black tracking-[0.22em] uppercase | Used for stage labels, section eyebrows</text>
  </g>
</svg>