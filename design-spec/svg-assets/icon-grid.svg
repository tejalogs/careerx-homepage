<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="600" viewBox="0 0 1200 600" fill="none">
  <title>CareerX Icon Grid - Lucide Icons</title>

  <!-- Background -->
  <rect width="1200" height="600" fill="white"/>

  <!-- Section label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">ICON GRID - LUCIDE ICONS</text>
  <text x="60" y="60" font-family="Inter, sans-serif" font-size="11" fill="#9CA3AF">All icons from lucide-react | Stroke width: 2 | Sizes: w-4 h-4 (16px), w-5 h-5 (20px), w-6 h-6 (24px)</text>

  <!-- ===== Stage Icons (Hero Orbit) ===== -->
  <text x="60" y="100" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0C0E14">Stage Icons (How It Works)</text>

  <!-- Compass - Discover -->
  <g transform="translate(60, 115)">
    <rect width="80" height="80" rx="16" fill="#F5D134" fill-opacity="0.15" stroke="#F5D134" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <circle cx="12" cy="12" r="3" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <line x1="12" y1="2" x2="12" y2="6" stroke="#0C0E14" stroke-width="2"/>
      <line x1="12" y1="18" x2="12" y2="22" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Compass</text>
  </g>

  <!-- BookOpen - Prepare -->
  <g transform="translate(160, 115)">
    <rect width="80" height="80" rx="16" fill="#F5D134" fill-opacity="0.15" stroke="#F5D134" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <path d="M2 4 L12 8 L22 4 L22 20 L12 24 L2 20 Z" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
      <line x1="12" y1="8" x2="12" y2="24" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">BookOpen</text>
  </g>

  <!-- Mic - Validate -->
  <g transform="translate(260, 115)">
    <rect width="80" height="80" rx="16" fill="#F5D134" fill-opacity="0.15" stroke="#F5D134" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <rect x="6" y="2" width="12" height="16" rx="6" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <path d="M2 14 C2 20 6 24 12 24 C18 24 22 20 22 14" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <line x1="12" y1="24" x2="12" y2="28" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Mic</text>
  </g>

  <!-- Rocket - Activate -->
  <g transform="translate(360, 115)">
    <rect width="80" height="80" rx="16" fill="#F5D134" fill-opacity="0.15" stroke="#F5D134" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <path d="M12 2 C12 2 4 10 4 18 L12 22 L20 18 C20 10 12 2 12 2Z" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
      <circle cx="12" cy="12" r="2" fill="#0C0E14"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Rocket</text>
  </g>

  <!-- ===== Service Icons ===== -->
  <text x="60" y="230" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0C0E14">Service Card Icons</text>

  <!-- BarChart3 -->
  <g transform="translate(60, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <rect x="2" y="14" width="4" height="10" rx="1" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <rect x="10" y="6" width="4" height="18" rx="1" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <rect x="18" y="10" width="4" height="14" rx="1" fill="none" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">BarChart3</text>
  </g>

  <!-- Bot -->
  <g transform="translate(160, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <rect x="2" y="6" width="20" height="16" rx="4" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <circle cx="8" cy="14" r="2" fill="#0C0E14"/>
      <circle cx="16" cy="14" r="2" fill="#0C0E14"/>
      <line x1="12" y1="2" x2="12" y2="6" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Bot</text>
  </g>

  <!-- BadgeCheck -->
  <g transform="translate(260, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <polyline points="8,12 11,15 16,9" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">BadgeCheck</text>
  </g>

  <!-- FileText -->
  <g transform="translate(360, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <path d="M4 2 L16 2 L20 6 L20 22 L4 22 Z" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
      <line x1="8" y1="10" x2="16" y2="10" stroke="#0C0E14" stroke-width="1.5"/>
      <line x1="8" y1="14" x2="16" y2="14" stroke="#0C0E14" stroke-width="1.5"/>
      <line x1="8" y1="18" x2="12" y2="18" stroke="#0C0E14" stroke-width="1.5"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">FileText</text>
  </g>

  <!-- BellRing -->
  <g transform="translate(460, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 16)">
      <path d="M6 10 C6 6 8 2 12 2 C16 2 18 6 18 10 L18 16 L22 18 L2 18 L6 16 Z" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
      <path d="M9 20 C9 22 10 24 12 24 C14 24 15 22 15 20" fill="none" stroke="#0C0E14" stroke-width="2"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">BellRing</text>
  </g>

  <!-- Video -->
  <g transform="translate(560, 245)">
    <rect width="80" height="80" rx="16" fill="#EEF2FF" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(26, 18)">
      <rect x="2" y="4" width="16" height="16" rx="3" fill="none" stroke="#0C0E14" stroke-width="2"/>
      <polygon points="18,8 24,5 24,19 18,16" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Video</text>
  </g>

  <!-- ===== UI Icons ===== -->
  <text x="60" y="365" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0C0E14">UI / Navigation Icons</text>

  <!-- ArrowRight -->
  <g transform="translate(60, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <line x1="2" y1="12" x2="22" y2="12" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
      <polyline points="16,6 22,12 16,18" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">ArrowRight</text>
  </g>

  <!-- ChevronDown -->
  <g transform="translate(160, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <polyline points="4,8 12,16 20,8" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">ChevronDown</text>
  </g>

  <!-- Menu -->
  <g transform="translate(260, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <line x1="2" y1="6" x2="22" y2="6" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="12" x2="22" y2="12" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
      <line x1="2" y1="18" x2="22" y2="18" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Menu</text>
  </g>

  <!-- X (close) -->
  <g transform="translate(360, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <line x1="4" y1="4" x2="20" y2="20" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
      <line x1="20" y1="4" x2="4" y2="20" stroke="#0C0E14" stroke-width="2" stroke-linecap="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">X (Close)</text>
  </g>

  <!-- Check -->
  <g transform="translate(460, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <polyline points="4,12 9,17 20,6" fill="none" stroke="#0C0E14" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Check</text>
  </g>

  <!-- Play -->
  <g transform="translate(560, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <polygon points="4,2 4,22 20,12" fill="#0C0E14" stroke="#0C0E14" stroke-width="2" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">Play</text>
  </g>

  <!-- CheckCircle2 -->
  <g transform="translate(660, 380)">
    <rect width="80" height="80" rx="16" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <g transform="translate(28, 18)">
      <circle cx="12" cy="12" r="10" fill="none" stroke="#22C55E" stroke-width="2"/>
      <polyline points="8,12 11,15 16,9" fill="none" stroke="#22C55E" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <text x="40" y="70" font-family="Inter, sans-serif" font-size="10" font-weight="600" fill="#374151" text-anchor="middle">CheckCircle2</text>
  </g>

  <!-- ===== Social Icons ===== -->
  <text x="60" y="500" font-family="Inter, sans-serif" font-size="12" font-weight="700" fill="#0C0E14">Footer Social Icons</text>

  <!-- Youtube -->
  <g transform="translate(60, 515)">
    <rect width="40" height="40" rx="8" fill="rgba(255,255,255,0.12)" stroke="#3C61A8" stroke-width="1"/>
    <g transform="translate(8, 8)">
      <rect x="2" y="4" width="20" height="16" rx="4" fill="none" stroke="#3C61A8" stroke-width="2"/>
      <polygon points="10,8 10,16 16,12" fill="#3C61A8"/>
    </g>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6B7280" text-anchor="middle">Youtube</text>
  </g>

  <!-- Linkedin -->
  <g transform="translate(120, 515)">
    <rect width="40" height="40" rx="8" fill="rgba(255,255,255,0.12)" stroke="#3C61A8" stroke-width="1"/>
    <g transform="translate(10, 10)">
      <rect x="0" y="8" width="4" height="12" fill="#3C61A8"/>
      <circle cx="2" cy="3" r="2" fill="#3C61A8"/>
      <path d="M8 8 L8 20 L12 20 L12 14 C12 11 14 11 15 12 L16 14 L16 20 L20 20 L20 12 C20 8 16 8 14 10 L14 8 Z" fill="#3C61A8"/>
    </g>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6B7280" text-anchor="middle">Linkedin</text>
  </g>

  <!-- Instagram -->
  <g transform="translate(180, 515)">
    <rect width="40" height="40" rx="8" fill="rgba(255,255,255,0.12)" stroke="#3C61A8" stroke-width="1"/>
    <g transform="translate(10, 10)">
      <rect x="1" y="1" width="18" height="18" rx="5" fill="none" stroke="#3C61A8" stroke-width="2"/>
      <circle cx="10" cy="10" r="4" fill="none" stroke="#3C61A8" stroke-width="2"/>
      <circle cx="16" cy="4" r="1.5" fill="#3C61A8"/>
    </g>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6B7280" text-anchor="middle">Instagram</text>
  </g>

  <!-- Medium -->
  <g transform="translate(240, 515)">
    <rect width="40" height="40" rx="8" fill="rgba(255,255,255,0.12)" stroke="#3C61A8" stroke-width="1"/>
    <text x="20" y="26" font-family="Inter, sans-serif" font-size="14" font-weight="900" fill="#3C61A8" text-anchor="middle">M</text>
    <text x="20" y="58" font-family="Inter, sans-serif" font-size="9" font-weight="600" fill="#6B7280" text-anchor="middle">Medium</text>
  </g>

  <!-- Spec note -->
  <text x="340" y="540" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Social icons: 40x40px, rounded-lg (8px), bg: rgba(255,255,255,0.12), hover: bg-white/20</text>
  <text x="340" y="556" font-family="Inter, sans-serif" font-size="10" fill="#9CA3AF">Icon container (services): 40x40 rounded-xl bg-#F5D134, icon w-5 h-5 color #0C0E14</text>
</svg>