<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" fill="none">
  <title>CareerX Navbar - Frosted Glass Pill</title>

  <!-- Background -->
  <rect width="1200" height="300" fill="#F7F8FC"/>

  <!-- Label -->
  <text x="60" y="40" font-family="Inter, sans-serif" font-size="14" font-weight="700" fill="#3C61A8" letter-spacing="0.2em">NAVBAR COMPONENT</text>

  <!-- ===== Desktop Navbar ===== -->
  <text x="60" y="90" font-family="Inter, sans-serif" font-size="12" font-weight="600" fill="#9CA3AF">Desktop (frosted glass pill, h=44, rounded-full)</text>

  <!-- Pill container -->
  <g transform="translate(200, 110)">
    <!-- Glass background -->
    <rect width="800" height="44" rx="22" fill="white" fill-opacity="0.72" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>

    <!-- Logo area -->
    <!-- Brand logo mark (simplified 4-petal) -->
    <g transform="translate(16, 13)">
      <rect x="1" y="3" width="7" height="4" rx="2" fill="#F5D134" transform="rotate(45 4.5 5)"/>
      <rect x="10" y="3" width="7" height="4" rx="2" fill="#F5D134" transform="rotate(-45 13.5 5)"/>
      <rect x="1" y="11" width="7" height="4" rx="2" fill="#F5D134" transform="rotate(-45 4.5 13)"/>
      <rect x="10" y="11" width="7" height="4" rx="2" fill="#F5D134" transform="rotate(45 13.5 13)"/>
      <circle cx="9" cy="1" r="1.2" fill="#F5D134"/>
      <circle cx="9" cy="17" r="1.2" fill="#F5D134"/>
      <circle cx="1" cy="9" r="1.2" fill="#F5D134"/>
      <circle cx="17" cy="9" r="1.2" fill="#F5D134"/>
    </g>

    <!-- Brand name -->
    <text x="40" y="27" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#0C0E14" letter-spacing="-0.02em">Career</text>
    <text x="80" y="27" font-family="Inter, sans-serif" font-size="13" font-weight="600" fill="#3C61A8" letter-spacing="-0.02em">X</text>

    <!-- Separator dot -->
    <circle cx="100" cy="22" r="1.5" fill="black" fill-opacity="0.1"/>

    <!-- Nav links -->
    <text x="116" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="500" fill="rgba(0,0,0,0.7)">How It Works</text>
    <text x="210" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="500" fill="rgba(0,0,0,0.7)">Products</text>
    <text x="286" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="500" fill="rgba(0,0,0,0.7)">Pricing</text>
    <text x="345" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="500" fill="rgba(0,0,0,0.7)">For Institutions</text>

    <!-- Separator dot -->
    <circle cx="456" cy="22" r="1.5" fill="black" fill-opacity="0.1"/>

    <!-- Login -->
    <text x="472" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="500" fill="rgba(0,0,0,0.7)">Login</text>

    <!-- CTA Button -->
    <rect x="520" y="6" width="170" height="32" rx="16" fill="#0C0E14"/>
    <text x="540" y="27" font-family="Inter, sans-serif" font-size="12.5" font-weight="600" fill="white">Find My Best Role</text>
    <!-- Arrow icon -->
    <line x1="670" y1="22" x2="680" y2="22" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    <polyline points="676,18 680,22 676,26" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- ===== Spec annotations ===== -->
  <g transform="translate(200, 170)">
    <!-- Height annotation -->
    <line x1="-10" y1="-60" x2="-10" y2="-16" stroke="#3C61A8" stroke-width="0.5" stroke-dasharray="3,3"/>
    <text x="-30" y="-35" font-family="Inter, sans-serif" font-size="10" fill="#3C61A8" transform="rotate(-90, -30, -35)">44px</text>
  </g>

  <!-- Style specs -->
  <text x="60" y="200" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">background: rgba(255, 255, 255, 0.72)</text>
  <text x="60" y="216" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">backdrop-filter: blur(40px) saturate(180%)</text>
  <text x="60" y="232" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">border: 1px solid rgba(0, 0, 0, 0.08)</text>
  <text x="60" y="248" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">border-radius: 22px (pill)</text>
  <text x="60" y="264" font-family="Inter, sans-serif" font-size="11" fill="#6B7280">CTA gradient: linear-gradient(135deg, #0C0E14, #1a1e2e)</text>

  <!-- Color swatches for reference -->
  <g transform="translate(500, 196)">
    <rect width="16" height="16" rx="4" fill="#0C0E14"/>
    <text x="22" y="13" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">Dark #0C0E14</text>
    <rect x="120" width="16" height="16" rx="4" fill="#3C61A8"/>
    <text x="142" y="13" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">Blue #3C61A8</text>
    <rect x="240" width="16" height="16" rx="4" fill="#F5D134"/>
    <text x="262" y="13" font-family="Inter, sans-serif" font-size="10" fill="#6B7280">Yellow #F5D134</text>
  </g>
</svg>