<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <style>
    .icon-label { font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: 500; fill: #9CA3AF; }
  </style>

  <!-- Search Icon -->
  <g transform="translate(0, 0)">
    <circle cx="16" cy="16" r="16" fill="#F7F8FC"/>
    <g transform="translate(6, 6)" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="9" cy="9" r="6"/>
      <line x1="13.5" y1="13.5" x2="18" y2="18"/>
    </g>
    <text class="icon-label" x="16" y="48" text-anchor="middle">Search</text>
  </g>

  <!-- BookOpen Icon -->
  <g transform="translate(80, 0)">
    <circle cx="16" cy="16" r="16" fill="#F7F8FC"/>
    <g transform="translate(6, 6)" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M1 3h6a4 4 0 0 1 4 4v12a3 3 0 0 0-3-3H1z"/>
      <path d="M19 3h-6a4 4 0 0 0-4 4v12a3 3 0 0 1 3-3h7z"/>
    </g>
    <text class="icon-label" x="16" y="48" text-anchor="middle">BookOpen</text>
  </g>

  <!-- Mic Icon -->
  <g transform="translate(160, 0)">
    <circle cx="16" cy="16" r="16" fill="#F7F8FC"/>
    <g transform="translate(6, 6)" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="7" y="1" width="6" height="11" rx="3"/>
      <path d="M3 10v1a7 7 0 0 0 14 0v-1"/>
      <line x1="10" y1="18" x2="10" y2="20"/>
      <line x1="7" y1="20" x2="13" y2="20"/>
    </g>
    <text class="icon-label" x="16" y="48" text-anchor="middle">Mic</text>
  </g>

  <!-- Briefcase Icon -->
  <g transform="translate(240, 0)">
    <circle cx="16" cy="16" r="16" fill="#F7F8FC"/>
    <g transform="translate(6, 6)" fill="none" stroke="#0C0E14" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="1" y="7" width="18" height="12" rx="2"/>
      <path d="M7 7V5a2 2 0 0 1 2-2h2a2 2 0 0 1 2 2v2"/>
      <line x1="1" y1="12" x2="19" y2="12"/>
    </g>
    <text class="icon-label" x="16" y="48" text-anchor="middle">Briefcase</text>
  </g>

  <!-- Annotation -->
  <text font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="400" fill="#D1D5DB" x="160" y="72" text-anchor="middle">32px container, 20px icon, 1.5px stroke, Lucide style</text>
</svg>