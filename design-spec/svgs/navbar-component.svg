<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 80" width="900" height="80">
  <defs>
    <filter id="nav-shadow" x="-2%" y="-10%" width="104%" height="130%">
      <feDropShadow dx="0" dy="1" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Glass navbar pill -->
  <rect x="0" y="18" width="900" height="44" rx="22" ry="22" fill="#FFFFFF" fill-opacity="0.85" stroke="#E5E7EB" stroke-width="1" filter="url(#nav-shadow)"/>

  <!-- Logo area -->
  <g transform="translate(20, 28)">
    <!-- Logo icon -->
    <rect x="0" y="4" width="24" height="24" rx="6" fill="#3C61A8"/>
    <text font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="900" fill="#FFFFFF" x="12" y="20" text-anchor="middle">CX</text>
    <!-- Logo text -->
    <text font-family="Inter, system-ui, sans-serif" font-size="15" font-weight="800" fill="#0C0E14" x="32" y="21">CareerXcelerator</text>
  </g>

  <!-- Nav links (centered) -->
  <g transform="translate(300, 28)">
    <text font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#0C0E14" x="0" y="20">Features</text>
    <text font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280" x="80" y="20">Pricing</text>
    <text font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280" x="148" y="20">How It Works</text>
    <text font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="500" fill="#6B7280" x="252" y="20">Testimonials</text>
  </g>

  <!-- CTA button (right side) -->
  <g transform="translate(750, 28)">
    <rect x="0" y="0" width="130" height="32" rx="16" ry="16" fill="#0C0E14"/>
    <text font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="600" fill="#FFFFFF" x="65" y="21" text-anchor="middle">Get Started</text>
  </g>

  <!-- Annotation -->
  <text font-family="Inter, system-ui, sans-serif" font-size="10" font-weight="400" fill="#9CA3AF" x="450" y="76" text-anchor="middle">Glass navbar: 900px wide, 44px tall, 22px radius, semi-transparent white bg</text>
</svg>