<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 160" width="1120" height="160">
  <style>
    .swatch-name { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 600; fill: #0C0E14; }
    .swatch-hex { font-family: Inter, system-ui, sans-serif; font-size: 11px; font-weight: 400; fill: #6B7280; }
  </style>

  <!-- Primary Blue -->
  <g transform="translate(0, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Primary Blue</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#3C61A8"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#3C61A8</text>
  </g>

  <!-- Accent Yellow -->
  <g transform="translate(140, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Accent Yellow</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#F5D134"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#F5D134</text>
  </g>

  <!-- Dark -->
  <g transform="translate(280, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Dark</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#0C0E14"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#0C0E14</text>
  </g>

  <!-- Light BG -->
  <g transform="translate(420, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Light BG</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#F7F8FC</text>
  </g>

  <!-- Discover -->
  <g transform="translate(560, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Discover</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#4267B2"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#4267B2</text>
  </g>

  <!-- Prepare -->
  <g transform="translate(700, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Prepare</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#2D6A4F"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#2D6A4F</text>
  </g>

  <!-- Validate -->
  <g transform="translate(840, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Validate</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#92400E"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#92400E</text>
  </g>

  <!-- Activate -->
  <g transform="translate(980, 0)">
    <text class="swatch-name" x="60" y="12" text-anchor="middle">Activate</text>
    <rect x="0" y="20" width="120" height="80" rx="8" ry="8" fill="#6B21A8"/>
    <text class="swatch-hex" x="60" y="118" text-anchor="middle">#6B21A8</text>
  </g>
</svg>