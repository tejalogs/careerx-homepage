<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 500" width="1200" height="500">
  <style>
    .dim-label { font-family: Inter, system-ui, sans-serif; font-size: 10px; font-weight: 400; fill: #3C61A8; }
    .wireframe-text { font-family: Inter, system-ui, sans-serif; fill: #9CA3AF; }
  </style>

  <!-- Full width background -->
  <rect x="0" y="0" width="1200" height="500" fill="#F7F8FC"/>

  <!-- Max-width container (1152px centered) -->
  <rect x="24" y="0" width="1152" height="500" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="6,3"/>

  <!-- Left padding indicator -->
  <line x1="24" y1="0" x2="24" y2="500" stroke="#3C61A8" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="48" y1="0" x2="48" y2="500" stroke="#3C61A8" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <text class="dim-label" x="36" y="496" text-anchor="middle">24</text>

  <!-- Right padding indicator -->
  <line x1="1152" y1="0" x2="1152" y2="500" stroke="#3C61A8" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <line x1="1176" y1="0" x2="1176" y2="500" stroke="#3C61A8" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <text class="dim-label" x="1164" y="496" text-anchor="middle">24</text>

  <!-- Max-width annotation -->
  <line x1="24" y1="12" x2="1176" y2="12" stroke="#3C61A8" stroke-width="1" opacity="0.3"/>
  <text class="dim-label" x="600" y="10" text-anchor="middle">max-width: 1152px</text>

  <!-- Overline text -->
  <g transform="translate(600, 60)">
    <rect x="-60" y="-8" width="120" height="14" rx="2" fill="#3C61A8" opacity="0.1"/>
    <text class="wireframe-text" font-size="10" font-weight="900" letter-spacing="0.25em" x="0" y="4" text-anchor="middle">OVERLINE TEXT</text>
    <text class="dim-label" x="80" y="4">10px / 900 / uppercase / 0.25em</text>
  </g>

  <!-- Heading -->
  <g transform="translate(600, 110)">
    <rect x="-180" y="-20" width="360" height="30" rx="4" fill="#0C0E14" opacity="0.08"/>
    <text class="wireframe-text" font-size="20" font-weight="800" x="0" y="0" text-anchor="middle" fill="#6B7280">Section Heading</text>
    <text class="dim-label" x="200" y="0">48px / 800 / centered</text>
  </g>

  <!-- Subtext -->
  <g transform="translate(600, 160)">
    <rect x="-220" y="-10" width="440" height="16" rx="3" fill="#9CA3AF" opacity="0.1"/>
    <text class="wireframe-text" font-size="13" font-weight="400" x="0" y="2" text-anchor="middle" fill="#9CA3AF">Supporting description text that provides context for the section content.</text>
    <text class="dim-label" x="240" y="2">18px / 400 / muted / centered</text>
  </g>

  <!-- Spacing indicator between subtext and content -->
  <line x1="596" y1="176" x2="596" y2="224" stroke="#F5D134" stroke-width="1" stroke-dasharray="2,2"/>
  <text font-family="Inter, system-ui, sans-serif" font-size="9" font-weight="500" fill="#F5D134" x="604" y="204">48px gap</text>

  <!-- Content area placeholder -->
  <g transform="translate(48, 224)">
    <rect x="0" y="0" width="1104" height="240" rx="12" fill="#F7F8FC" stroke="#E5E7EB" stroke-width="1" stroke-dasharray="8,4"/>

    <!-- Grid columns -->
    <rect x="24" y="24" width="336" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text class="wireframe-text" font-size="12" font-weight="500" x="192" y="124" text-anchor="middle">Content Block 1</text>

    <rect x="384" y="24" width="336" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text class="wireframe-text" font-size="12" font-weight="500" x="552" y="124" text-anchor="middle">Content Block 2</text>

    <rect x="744" y="24" width="336" height="192" rx="8" fill="#FFFFFF" stroke="#E5E7EB" stroke-width="1"/>
    <text class="wireframe-text" font-size="12" font-weight="500" x="912" y="124" text-anchor="middle">Content Block 3</text>

    <!-- Content area label -->
    <text class="wireframe-text" font-size="11" font-weight="400" x="552" y="236" text-anchor="middle" fill="#D1D5DB">Content Area (variable height)</text>
  </g>

  <!-- Bottom padding -->
  <line x1="596" y1="464" x2="596" y2="500" stroke="#3C61A8" stroke-width="1" stroke-dasharray="2,2" opacity="0.4"/>
  <text class="dim-label" x="608" y="486">section padding: 96px top/bottom</text>
</svg>